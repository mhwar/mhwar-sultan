# Cloudflare Pages + D1 configuration for Bosla Works
#
# SETUP INSTRUCTIONS (run once):
#   1. npx wrangler login
#   2. npx wrangler d1 create bosla-db
#      → copy the "database_id" from the output and paste below
#   3. Edit this file: replace REPLACE_WITH_YOUR_D1_DATABASE_ID
#   4. npx wrangler d1 execute bosla-db --file=db/schema.sql --remote
#   5. In Cloudflare Pages dashboard:
#      Settings → Functions → D1 database bindings → Add:
#        Variable name: DB
#        D1 database:   bosla-db
#   6. Redeploy (or push to GitHub — Pages CI handles it)

name                    = "mhwar-sultan"
compatibility_date      = "2024-12-01"
pages_build_output_dir  = "out"

[[d1_databases]]
binding      = "DB"
database_name = "bosla-db"
database_id  = "acc951cf-7287-42e0-a316-507a70cf6719"
