<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>بوصلة الأعمال</title>
  <script>
    // SPA fallback for direct URL access — redirects to root so the client router takes over
    var l = window.location;
    var path = l.pathname || '/';
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?redirect=' + encodeURIComponent(path + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body style="background:#08080F;color:#94A3B8;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
  <p>جارٍ التحميل...</p>
</body>
</html>
