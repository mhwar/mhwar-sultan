<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>محور</title>
  <script>
    // SPA fallback for GitHub Pages — redirects any unknown path back to the app
    // so Next.js client-side router can take over.
    var base = '/mhwar-sultan';
    var l = window.location;
    var path = l.pathname.slice(base.length) || '/';
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      base + '/?redirect=' + encodeURIComponent(path + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body style="background:#08080F;color:#94A3B8;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
  <p>جارٍ التحميل...</p>
</body>
</html>
